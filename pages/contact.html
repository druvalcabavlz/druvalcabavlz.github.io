<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Dulce</title>
  <link rel="stylesheet" href="../assets/css/base/styles.css" />
  <link rel="stylesheet" href="../assets/css/components/components.css" />
</head>
<body>

  <header id="header"></header>

  <main class="page-content">
    <div class="container">
      <h1 class="page-title">Contact</h1>
      <p class="page-desc">Let's connect! Reach out below.</p>
      <form id="contact-form" class="contact-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Your message..." required></textarea>
        </div>
        <button type="submit" class="btn">Send Message</button>
      </form>
    </div>
  </main>

  <footer id="footer"></footer>

  <script src="../assets/js/shared/main.js"></script>
  <script src="../assets/js/shared/components.js"></script>
  <script src="../assets/js/pages/contact.js"></script>
</body>
</html>
