<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#334155" stroke-width="1" opacity="0.4"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>

  <!-- Left content area -->
  <!-- Day badge -->
  <rect x="64" y="80" width="210" height="36" rx="18" fill="#2563EB" opacity="0.18"/>
  <text x="169" y="103" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#60A5FA" text-anchor="middle" letter-spacing="2">DAY 4 · 30 DAYS AI CHALLENGE</text>

  <!-- Title -->
  <text x="64" y="180" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="#F1F5F9">I Scored My Product</text>
  <text x="64" y="242" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="#F1F5F9">Roadmap with AI</text>
  <text x="64" y="304" font-family="Arial Black, Arial, sans-serif" font-size="36" font-weight="700" fill="#2563EB">— and Built the Dashboard</text>
  <text x="64" y="354" font-family="Arial Black, Arial, sans-serif" font-size="36" font-weight="700" fill="#2563EB">to Prove It</text>

  <!-- Subtitle -->
  <text x="64" y="416" font-family="Arial, sans-serif" font-size="18" fill="#94A3B8">Flag every roadmap item · Score 0–100 · Track health over time</text>

  <!-- Author -->
  <text x="64" y="530" font-family="Arial, sans-serif" font-size="16" fill="#64748B">dulceruvalcaba.dev</text>
  <text x="64" y="558" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#475569">Dulce Lucero · Product Manager</text>

  <!-- Right panel: Score circles -->
  <!-- Green score -->
  <circle cx="900" cy="180" r="72" fill="none" stroke="#10B981" stroke-width="6"/>
  <text x="900" y="168" font-family="Arial Black, Arial, sans-serif" font-size="42" font-weight="900" fill="#10B981" text-anchor="middle">78</text>
  <text x="900" y="196" font-family="Arial, sans-serif" font-size="13" fill="#6B7280" text-anchor="middle" letter-spacing="1">SCORE</text>
  <text x="900" y="278" font-family="Arial, sans-serif" font-size="14" fill="#10B981" text-anchor="middle" font-weight="600">Healthy</text>

  <!-- Amber score -->
  <circle cx="1060" cy="280" r="56" fill="none" stroke="#F59E0B" stroke-width="5"/>
  <text x="1060" y="270" font-family="Arial Black, Arial, sans-serif" font-size="32" font-weight="900" fill="#F59E0B" text-anchor="middle">54</text>
  <text x="1060" y="292" font-family="Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">SCORE</text>
  <text x="1060" y="352" font-family="Arial, sans-serif" font-size="13" fill="#F59E0B" text-anchor="middle" font-weight="600">At Risk</text>

  <!-- Red score -->
  <circle cx="860" cy="400" r="48" fill="none" stroke="#EF4444" stroke-width="5"/>
  <text x="860" y="392" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="900" fill="#EF4444" text-anchor="middle">31</text>
  <text x="860" y="410" font-family="Arial, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">SCORE</text>
  <text x="860" y="462" font-family="Arial, sans-serif" font-size="12" fill="#EF4444" text-anchor="middle" font-weight="600">Critical</text>

  <!-- Flag badges -->
  <rect x="64" y="456" width="100" height="28" rx="14" fill="#F59E0B" opacity="0.15"/>
  <text x="114" y="474" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#F59E0B" text-anchor="middle">Vague</text>

  <rect x="176" y="456" width="90" height="28" rx="14" fill="#6B7280" opacity="0.2"/>
  <text x="221" y="474" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#9CA3AF" text-anchor="middle">Stale</text>

  <rect x="278" y="456" width="122" height="28" rx="14" fill="#F97316" opacity="0.15"/>
  <text x="339" y="474" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#F97316" text-anchor="middle">Unanchored</text>

  <rect x="412" y="456" width="158" height="28" rx="14" fill="#EF4444" opacity="0.15"/>
  <text x="491" y="474" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#EF4444" text-anchor="middle">Dependency Risk</text>

  <rect x="582" y="456" width="180" height="28" rx="14" fill="#8B5CF6" opacity="0.15"/>
  <text x="672" y="474" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#8B5CF6" text-anchor="middle">Stakeholder-Driven</text>

  <!-- Bottom accent line -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#accent)"/>
</svg>
